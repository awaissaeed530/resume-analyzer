<div
  class="max-w-2xl mx-auto mt-10 p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm"
>
  <h2
    class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-6"
  >
    Analyze Resume
  </h2>

  <form (submit)="submit()" [formGroup]="form" class="space-y-6">
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-slate-700 dark:text-slate-300"
        >Upload Resume</label
      >

      <div
        (dragover)="$event.preventDefault(); isDragging.set(true)"
        (dragleave)="isDragging.set(false)"
        (drop)="onFileDropped($event)"
        [class.border-indigo-500]="isDragging()"
        [class.bg-indigo-50/40]="isDragging()"
        [class.dark:bg-indigo-950/20]="isDragging()"
        [class.border-slate-300]="!isDragging && form.controls.resume.value"
        [class.dark:border-slate-700]="!isDragging && form.controls.resume.value"
        [class.border-emerald-500]="form.controls.resume.value"
        [class.bg-emerald-50/10]="form.controls.resume.value"
        [class.dark:bg-emerald-950/10]="form.controls.resume.value"
        class="relative group flex flex-col items-center justify-center w-full h-40 px-4 border-2 border-dashed rounded-2xl bg-slate-50/50 dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800 border-slate-300 dark:border-slate-700 hover:border-indigo-500 dark:hover:border-indigo-400 transition-all duration-200 cursor-pointer"
      >
        @if (!form.controls.resume.value) {
        <input
          type="file"
          (change)="onFileChange($event)"
          accept=".pdf,.docx,.txt"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
        />

        <div
          class="flex flex-col items-center text-center space-y-2 pointer-events-none"
        >
          <div
            [class.text-indigo-600]="isDragging()"
            [class.dark:text-indigo-400]="isDragging()"
            [class.scale-105]="isDragging()"
            class="p-2.5 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 group-hover:scale-105 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 text-slate-400 dark:text-slate-500 transition-all duration-200"
          >
            <svg lucideCloudUpload size="16"></svg>
          </div>

          <p class="text-sm text-slate-600 dark:text-slate-300 font-medium">
            @if (isDragging()) {
            <span
              class="text-indigo-600 dark:text-indigo-400 font-semibold animate-pulse"
              >Drop it here!</span
            >
            } @else { Drag and drop your file here, or
            <span
              class="text-indigo-600 dark:text-indigo-400 group-hover:text-indigo-700 dark:group-hover:text-indigo-300 underline underline-offset-2 decoration-2"
              >browse</span
            >
            }
          </p>
          <p class="text-xs text-slate-400 dark:text-slate-500 font-normal">
            Supports PDF, DOCX, or TXT
          </p>
        </div>

        } @else {
        <div class="flex flex-col items-center text-center space-y-3 z-20">
          <div
            class="p-2 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 rounded-xl border border-emerald-100 dark:border-emerald-900"
          >
            <svg lucideCheck size="16"></svg>
          </div>

          <div class="space-y-0.5">
            <p
              class="text-sm font-semibold text-slate-800 dark:text-slate-200 max-w-xs truncate px-2"
            >
              {{ form.controls.resume.value.name }}
            </p>
            <p
              class="text-xs text-emerald-600 dark:text-emerald-400 font-medium"
            >
              Ready for analysis
            </p>
          </div>

          <button
            type="button"
            (click)="clearFile($event)"
            class="text-xs font-semibold text-rose-600 dark:text-rose-400 hover:text-rose-700 dark:hover:text-rose-300 bg-rose-50 dark:bg-rose-950/40 hover:bg-rose-100 dark:hover:bg-rose-950/60 px-3 py-1.5 rounded-lg transition duration-150"
          >
            Remove file
          </button>
        </div>
        }
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-slate-700 dark:text-slate-300"
        >Job Description</label
      >
      <textarea
        formControlName="jobDescription"
        placeholder="Paste the target job description details here..."
        rows="6"
        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:bg-white dark:focus:bg-slate-900 focus:border-indigo-600 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-950/50 outline-none transition duration-200 resize-y min-h-30"
      ></textarea>
    </div>

    <div class="pt-2">
      <button
        type="submit"
        class="cursor-pointer w-full bg-indigo-600 dark:bg-indigo-500 hover:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-semibold text-sm py-3 px-4 rounded-xl shadow-md shadow-indigo-100 dark:shadow-none hover:shadow-none focus:ring-4 focus:ring-indigo-200 dark:focus:ring-indigo-800 transition duration-200 ease-in-out active:scale-[0.99] disabled:bg-gray-600 dark:disabled:bg-gray-700 disabled:cursor-not-allowed"
        [disabled]="loading()"
      >
        {{loading() ? 'Analyzing resume...' : 'Analyze Match'}}
      </button>
    </div>
  </form>
</div>

@if (analysis(); as analysis) {
<app-resume-analysis [analysis]="analysis" />
}
