<div
  class="max-w-2xl mx-auto mt-10 p-8 bg-white border border-slate-200 rounded-2xl shadow-sm"
>
  <h2 class="text-2xl font-bold tracking-tight text-slate-900 mb-6">
    Analyze Resume
  </h2>

  <form (submit)="submit()" [formGroup]="form" class="space-y-6">
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-slate-700">Upload Resume</label>

      <div
        (dragover)="$event.preventDefault(); isDragging.set(true)"
        (dragleave)="isDragging.set(false)"
        (drop)="onFileDropped($event)"
        [class.border-indigo-500]="isDragging()"
        [class.bg-indigo-50/40]="isDragging()"
        [class.border-slate-300]="!isDragging && form.controls.resume.value"
        [class.border-emerald-500]="form.controls.resume.value"
        [class.bg-emerald-50/10]="form.controls.resume.value"
        class="relative group flex flex-col items-center justify-center w-full h-40 px-4 border-2 border-dashed rounded-2xl bg-slate-50/50 hover:bg-slate-50 hover:border-indigo-500 transition-all duration-200 cursor-pointer"
      >
        @if (!form.controls.resume.value) {
        <input
          type="file"
          (change)="onFileChange($event)"
          accept=".pdf,.docx,.txt"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
        />

        <div
          class="flex flex-col items-center text-center space-y-2 pointer-events-none"
        >
          <div
            [class.text-indigo-600]="isDragging()"
            [class.scale-105]="isDragging()"
            class="p-2.5 bg-white rounded-xl shadow-sm border border-slate-100 group-hover:scale-105 group-hover:text-indigo-600 text-slate-400 transition-all duration-200"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"
              />
            </svg>
          </div>

          <p class="text-sm text-slate-600 font-medium">
            @if (isDragging()) {
            <span class="text-indigo-600 font-semibold animate-pulse"
              >Drop it here!</span
            >
            } @else { Drag and drop your file here, or
            <span
              class="text-indigo-600 group-hover:text-indigo-700 underline underline-offset-2 decoration-2"
              >browse</span
            >
            }
          </p>
          <p class="text-xs text-slate-400 font-normal">
            Supports PDF, DOCX, or TXT
          </p>
        </div>

        } @else {
        <div class="flex flex-col items-center text-center space-y-3 z-20">
          <div
            class="p-2 bg-emerald-50 text-emerald-600 rounded-xl border border-emerald-100"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2.5"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4.5 12.75l6 6 9-13.5"
              />
            </svg>
          </div>

          <div class="space-y-0.5">
            <p
              class="text-sm font-semibold text-slate-800 max-w-xs truncate px-2"
            >
              {{ form.controls.resume.value.name }}
            </p>
            <p class="text-xs text-emerald-600 font-medium">
              Ready for analysis
            </p>
          </div>

          <button
            type="button"
            (click)="clearFile($event)"
            class="text-xs font-semibold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition duration-150"
          >
            Remove file
          </button>
        </div>
        }
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-slate-700">Job Description</label>
      <textarea
        formControlName="jobDescription"
        placeholder="Paste the target job description details here..."
        rows="6"
        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 text-slate-900 text-sm placeholder:text-slate-400 focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 outline-none transition duration-200 resize-y min-h-30"
      ></textarea>
    </div>

    <div class="pt-2">
      <button
        type="submit"
        class="cursor-pointer w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-3 px-4 rounded-xl shadow-md shadow-indigo-100 hover:shadow-none focus:ring-4 focus:ring-indigo-200 transition duration-200 ease-in-out active:scale-[0.99] disabled:bg-gray-600 disabled:cursor-not-allowed"
        [disabled]="loading()"
      >
        {{loading() ? 'Analyzing resume...' : 'Analyze Match'}}
      </button>
    </div>
  </form>
</div>

@if (analysis(); as analysis) {
<app-resume-analysis [analysis]="analysis" />
}
